<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQTS3azUjV7VaHKMmB1LCRWAKRWRuhElTUldg&s">
    <title>Сайт лаба css</title>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --dark-green: #1a3b2e;
            --light-green: #4a7c5c;
            --red: #d35c5c;
            --white: #ffffff;
            --gray: #666;
            --light-gray: #e0e0e0;
            --dark-gray: #4b4848;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1600&auto=format');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 59, 46, 0.8);
            z-index: -1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .header-icon {
            width: 40px;
            height: 40px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive; 
            color: var(--white);
            margin-bottom: 0;
            font-size: 1.5em;
            text-align: center;
        }

        form {
            display: flex;
            margin-bottom: 30px;
            max-width: 600px;
            width: 100%;
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--light-green);
            border-right: none;
        }

        form button {
            padding: 15px 25px;
            border: 2px solid var(--light-green);
            cursor: pointer;
            transition: 0.3s;
        }

        form button[type="Submit"] {
            background: var(--light-green);
            color: var(--white);
            border-left: none;
        }

        form button[type="Submit"]:hover {
            background: #3d684b;
        }

        form button[type="Reset"] {
            background: var(--red);
            color: var(--white);
            border-left: none;
        }

        form button[type="Reset"]:hover {
            background: #b84b4b;
        }

        .todo-container {
            max-width: 600px;
            width: 100%;
            max-height: 400px;
            overflow-y: auto; 
            overflow-x: hidden;
            background: var(--white);
            border-radius: 8px;
          
        }

        ol {
            list-style: none;
            width: 100%;
            padding: 0;
            margin: 0;
        }

        li {
            background: var(--white);
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        li:last-child {
            border-bottom: none;
        }

        li:hover {
            background: var(--light-gray);
        }

        li:hover button {
            color: var(--gray);
        }

        li label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .task-text {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .task-text span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .completed-task {
            text-decoration: line-through;
            color: var(--gray);
        }

        .not-completed-task {
            text-decoration: none;
        }

        input[type="checkbox"]:checked ~ .task-text .completed-task {
            display: inline-block;
        }
        
        input[type="checkbox"]:checked ~ .task-text .not-completed-task {
            display: none;
        }

        input[type="checkbox"]:not(:checked) ~ .task-text .completed-task {
            display: none;
        }
        
        input[type="checkbox"]:not(:checked) ~ .task-text .not-completed-task {
            display: inline-block;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
        }

        li:has(input[type="checkbox"]:checked) {
            background: var(--dark-gray);
            border-bottom: 1px solid #4a4a4a;
        }

        li:has(input[type="checkbox"]:checked):last-child {
            border-bottom: none;
        }

        li:has(input[type="checkbox"]:checked) .task-text span,
        li:has(input[type="checkbox"]:checked) .completed-task,
        li:has(input[type="checkbox"]:checked) sub,
        li:has(input[type="checkbox"]:checked) button {
            color: var(--white);
        }

        li:has(input[type="checkbox"]:checked):hover {
            background: var(--dark-gray);
        }

        sub {
            color: var(--gray);
            font-size: 0.75em;
            margin-top: 4px;
        }

        li button {
            padding: 0 8px;
            background: none;
            font-size: 22px;
            color: #000;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        li button:hover {
            transform: rotate(90deg);
        }

        footer {
            text-align: center;
            color: var(--white);
            max-width: 600px;
            width: 100%;
            margin-top: auto;
            flex-shrink: 0;
        }

        footer hr {
            border: none;
            height: 2px;
            background: var(--light-green);
            margin-bottom: 20px;
        }

        @media (max-width: 500px) {
            form {
                flex-direction: column;
            }
            
            input[type="text"] {
                width: 100%;
                border-right: 2px solid var(--light-green);
            }
            
            form button {
                width: 100%;
                border-left: 2px solid var(--light-green);
            }
            
            .header-icon {
                width: 30px;
                height: 30px;
            }
            
            h1 {
                font-size: 1.2em;
            }
            
            .todo-container {
                max-height: 300px;
            }
        }

        .empty-message {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: var(--white);
            border: 2px solid var(--light-green);
            width: 100%;
        }

        ol:empty {
            display: none;
        }

        ol:empty + .empty-message {
            display: block;
        }
    </style>
</head>
